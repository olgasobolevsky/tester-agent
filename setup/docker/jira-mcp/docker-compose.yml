services:
  jira-mcp:
    image: ghcr.io/sooperset/mcp-atlassian:latest
    env_file:
      - ../../../.env
    command: ["--transport", "sse", "--port", "9000"]
    ports:
      - "9000:9000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
